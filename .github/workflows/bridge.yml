name: Build Bridge Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'bridge/**'
      - '.github/workflows/bridge.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            suffix: ""
          - arch: x86
            suffix: "-x86"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8 (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bridge/requirements-bridge.txt

      - name: Build .exe with PyInstaller (${{ matrix.arch }})
        run: pyinstaller --onefile --windowed --name FactuposPrintBridge${{ matrix.suffix }} --hidden-import serial.tools.list_ports --hidden-import pystray._win32 bridge/factupos_print_bridge_windows.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactuposPrintBridge-${{ matrix.arch }}
          path: dist/FactuposPrintBridge${{ matrix.suffix }}.exe
          if-no-files-found: error

  # Empaqueta los .exe del Bridge en instaladores por arquitectura (Inno Setup)
  # con autostart (tray) + permisos para auto-update.
  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar .exe x64
        uses: actions/download-artifact@v4
        with:
          name: FactuposPrintBridge-x64
          path: bridge/installer

      - name: Descargar .exe x86
        uses: actions/download-artifact@v4
        with:
          name: FactuposPrintBridge-x86
          path: bridge/installer

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador x64 (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DARCH=x64 bridge\installer\factupos-bridge.iss'

      - name: Compilar instalador x86 (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DARCH=x86 bridge\installer\factupos-bridge.iss'

      - name: Subir instaladores (x64 + x86)
        uses: actions/upload-artifact@v4
        with:
          name: factupos-bridge-installers
          path: bridge\installer\Output\Factupos-Bridge-*.exe
          if-no-files-found: error
