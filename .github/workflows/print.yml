name: Build Print Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'print/**'
      - '.github/workflows/print.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            suffix: ""
          - arch: x86
            suffix: "-x86"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8 (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r print/requirements-build.txt

      - name: Build .exe with PyInstaller (${{ matrix.arch }})
        run: pyinstaller --onefile --windowed --name FactuPOS_Print${{ matrix.suffix }} print/factupos_print_client.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactuPOS_Print-${{ matrix.arch }}
          path: dist/FactuPOS_Print${{ matrix.suffix }}.exe
          if-no-files-found: error

  # Empaqueta los dos .exe en instaladores por arquitectura (Inno Setup) con
  # autostart oculto + permisos para auto-update. Corre despues de compilar ambos.
  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar .exe x64
        uses: actions/download-artifact@v4
        with:
          name: FactuPOS_Print-x64
          path: print/installer

      - name: Descargar .exe x86
        uses: actions/download-artifact@v4
        with:
          name: FactuPOS_Print-x86
          path: print/installer

      - name: Descargar SumatraPDF (para modo DataReport, x64)
        shell: pwsh
        run: Invoke-WebRequest -Uri "https://soportereal.com/software/factupos-app/windows/SumatraPDF.exe" -OutFile "print/installer/SumatraPDF.exe"

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador x64 (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DARCH=x64 print\installer\factupos-print.iss'

      - name: Compilar instalador x86 (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DARCH=x86 print\installer\factupos-print.iss'

      - name: Subir instaladores (x64 + x86)
        uses: actions/upload-artifact@v4
        with:
          name: factupos-print-installers
          path: print\installer\Output\Factupos-Print-*.exe
          if-no-files-found: error
