name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            suffix: ""
          - arch: x86
            suffix: "-x86"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.8 (${{ matrix.arch }})
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build .exe with PyInstaller (${{ matrix.arch }})
        run: pyinstaller --onefile --windowed --name FactuPOS_Print${{ matrix.suffix }} factupos_print_client.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactuPOS_Print-${{ matrix.arch }}
          path: dist/FactuPOS_Print${{ matrix.suffix }}.exe
          if-no-files-found: error
