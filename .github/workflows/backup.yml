name: Build Backup Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'backup/**'
      - '.github/workflows/backup.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backup/requirements-build.txt

      - name: Build GUI (FactuposBackup.exe)
        run: >
          pyinstaller --onefile --windowed --clean --noconfirm
          --name FactuposBackup
          --version-file backup/version_info.txt
          --hidden-import pystray._win32
          --hidden-import PIL._tkinter_finder
          --collect-submodules pyodbc
          backup/backup_app.py

      - name: Build CLI (FactuposBackupCLI.exe)
        run: >
          pyinstaller --onefile --console --clean --noconfirm
          --name FactuposBackupCLI
          --version-file backup/version_info.txt
          --collect-submodules pyodbc
          backup/backup_cli.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FactuposBackup-exe
          path: |
            dist/FactuposBackup.exe
            dist/FactuposBackupCLI.exe
          if-no-files-found: error
