name: Build Panel (Linux .deb)

on:
  push:
    branches: [main]
    paths:
      - 'panel/**'
      - '.github/workflows/panel.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version del paquete'
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar sintaxis Python
        run: python3 -m py_compile panel/factupos-panel.py

      - name: Construir .deb
        run: |
          VER="${{ github.event.inputs.version || '1.0.0' }}"
          chmod +x panel/installer/build-deb.sh
          panel/installer/build-deb.sh "$VER" "$GITHUB_WORKSPACE/out"
          ls -la "$GITHUB_WORKSPACE/out"

      - name: Verificar contenido del .deb
        run: |
          dpkg-deb --info  out/*.deb
          dpkg-deb --contents out/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: factupos-panel-deb
          path: out/*.deb
          retention-days: 90
